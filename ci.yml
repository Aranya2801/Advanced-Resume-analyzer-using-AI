name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint & Format ────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install lint tools
        run: pip install black isort flake8 mypy
      - name: Black check
        run: black --check src/ tests/
      - name: isort check
        run: isort --check-only src/ tests/
      - name: Flake8
        run: flake8 src/ tests/ --max-line-length=120 --ignore=E203,W503

  # ── Tests ────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install spacy textstat sentence-transformers scikit-learn numpy pandas pdfplumber python-docx loguru anthropic
          python -m spacy download en_core_web_sm
      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Security Scan ────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r src/ -ll

  # ── Docker Build ─────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t advanced-resume-analyzer:latest .
      - name: Test container starts
        run: |
          docker run -d -p 8501:8501 --name test-app \
            -e ANTHROPIC_API_KEY=dummy \
            advanced-resume-analyzer:latest &
          sleep 15
          docker ps | grep test-app && echo "✅ Container running"
          docker stop test-app
